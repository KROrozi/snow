<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Real Sound Snow Tracks</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #e0e0e0; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            cursor: none;
        }
        canvas { display: block; }
        
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            transition: opacity 0.5s;
            backdrop-filter: blur(5px);
            text-align: center;
        }
        #loading-text { margin-top: 10px; font-size: 14px; color: #ccc; }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 5;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 90%;
        }
        .btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn.active {
            background: #222;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 style="margin:0;">화면을 클릭하여 시작</h2>
        <div id="loading-text">고음질 사운드 로딩 중...</div>
    </div>
    
    <div id="controls">
        <button class="btn active" onclick="setAnimal('human')">사람 👣</button>
        <button class="btn" onclick="setAnimal('cat')">고양이 🐾</button>
        <button class="btn" onclick="setAnimal('dog')">강아지 🐕</button>
        <button class="btn" onclick="setAnimal('duck')">오리 🦆</button>
        <button class="btn" onclick="setAnimal('snake')">뱀 🐍</button>
    </div>

    <canvas id="snowCanvas"></canvas>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const loadingText = document.getElementById('loading-text');
        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');

        // --- 변수 설정 ---
        let width, height;
        let footprints = [];
        let inputX = 0, inputY = 0;
        let lastStepX = 0, lastStepY = 0;
        let isLeftFoot = true;
        let isInteracting = false; 

        // --- 오디오 관련 변수 ---
        let audioCtx;
        let snowBuffer = null; // 실제 사운드 데이터가 담길 곳
        let isAudioReady = false;

        // 실제 눈 밟는 소리 파일 (구글 호스팅 사용)
        const SOUND_URL = 'https://actions.google.com/sounds/v1/foley/footsteps_snow.ogg';

        // 동물별 설정 (pitch: 소리 높낮이 1.0이 기본, 높을수록 가벼운 소리)
        const animals = {
            human: { dist: 50, pitch: 1.0,  func: drawHuman },
            cat:   { dist: 25, pitch: 2.0,  func: drawCat },   // 아주 가벼운 소리
            dog:   { dist: 35, pitch: 1.4,  func: drawDog },
            duck:  { dist: 20, pitch: 1.8,  func: drawDuck },
            snake: { dist: 4,  pitch: 0.5,  func: drawSnake }  // 낮고 느린 소리
        };

        let currentAnimal = 'human';

        // --- 초기화 ---
        function init() {
            resize();
            createSnowBackground();
            loadSound(); // 사운드 파일 다운로드 시작
            animate();
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            bgCanvas.width = width;
            bgCanvas.height = height;
            createSnowBackground();
        }

        window.setAnimal = function(name) {
            currentAnimal = name;
            event.stopPropagation();
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        };

        // --- 진짜 사운드 로딩 (Fetch API) ---
        async function loadSound() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const response = await fetch(SOUND_URL);
                const arrayBuffer = await response.arrayBuffer();
                
                // 오디오 데이터 디코딩
                snowBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                isAudioReady = true;
                loadingText.innerText = "로딩 완료! 클릭해서 시작하세요.";
            } catch (error) {
                console.error("사운드 로딩 실패:", error);
                loadingText.innerText = "사운드 로딩 실패 (인터넷 연결 확인 필요)";
            }
        }

        // --- 오디오 재생 엔진 (핵심) ---
        function playRealSnowSound() {
            if (!audioCtx || !snowBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const source = audioCtx.createBufferSource();
            source.buffer = snowBuffer;

            // 1. 동물별 기본 톤 설정
            let basePitch = animals[currentAnimal].pitch;
            
            // 2. 랜덤 변주 (기관총 효과 방지)
            // 매 걸음마다 0.9 ~ 1.1 배속 사이로 미세하게 변화를 줌
            const randomDetune = 0.9 + Math.random() * 0.2; 
            source.playbackRate.value = basePitch * randomDetune;

            // 3. 볼륨 조절
            const gainNode = audioCtx.createGain();
            // 뱀은 소리가 작게, 나머지는 적당히
            const volume = currentAnimal === 'snake' ? 0.2 : 0.6;
            gainNode.gain.value = volume;

            // 4. 소리가 너무 길면 자르기 (짧고 간결하게 '뽀득')
            // 원본 파일이 길 수 있으므로 0.3초 뒤에 페이드 아웃
            gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 재생 시작
            // 뱀은 연속적이라 시작 위치를 랜덤으로 해서 텍스처를 만듦
            const offset = currentAnimal === 'snake' ? Math.random() * 2 : 0;
            source.start(0, offset); 
        }

        // --- 배경 그래픽 ---
        function createSnowBackground() {
            bgCtx.fillStyle = '#FFFFFF';
            bgCtx.fillRect(0, 0, width, height);
            const imageData = bgCtx.getImageData(0, 0, width, height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const grain = (Math.random() - 0.5) * 15;
                data[i] = 255 - grain;
                data[i+1] = 255 - grain;
                data[i+2] = 255 - grain + 2;
            }
            bgCtx.putImageData(imageData, 0, 0);
        }

        // --- 그리기 함수들 ---
        function drawHuman(ctx, isLeft) {
            const offset = isLeft ? -12 : 12;
            ctx.translate(0, offset);
            ctx.beginPath();
            ctx.ellipse(-8, 0, 10, 7, 0, 0, Math.PI * 2);
            ctx.ellipse(8, 0, 13, 9, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        function drawCat(ctx, isLeft) {
            const offset = isLeft ? -5 : 5;
            ctx.translate(0, offset);
            ctx.beginPath(); ctx.ellipse(0, 0, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
            for(let i=-1.5; i<=1.5; i+=1) {
                ctx.beginPath(); ctx.arc(8, i * 4, 2.5, 0, Math.PI*2); ctx.fill();
            }
        }
        function drawDog(ctx, isLeft) {
            const offset = isLeft ? -10 : 10;
            ctx.translate(0, offset);
            ctx.beginPath(); ctx.moveTo(-5, -5); ctx.lineTo(-5, 5); ctx.lineTo(5, 0); ctx.fill();
            for(let i=-1.5; i<=1.5; i+=1) {
                const y = i * 5;
                ctx.beginPath(); ctx.arc(8, y, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(14, y, 1, 0, Math.PI*2); 
                ctx.fillStyle = "#ccc"; ctx.fill(); ctx.fillStyle = "#Eef2f5";
            }
        }
        function drawDuck(ctx, isLeft) {
            const offset = isLeft ? -8 : 8;
            ctx.translate(0, offset);
            ctx.lineWidth = 2; ctx.strokeStyle = "#Eef2f5"; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(10, 0);
            ctx.moveTo(-5, 0); ctx.lineTo(8, -6);
            ctx.moveTo(-5, 0); ctx.lineTo(8, 6); ctx.stroke();
        }
        function drawSnake(ctx, isLeft) {
            ctx.beginPath(); ctx.ellipse(0, 0, 15, 6, 0, 0, Math.PI * 2); ctx.fill();
        }

        class Footprint {
            constructor(x, y, angle, isLeft, type) {
                this.x = x; this.y = y; this.angle = angle;
                this.isLeft = isLeft; this.type = type;
                this.opacity = 1.0; this.scale = 0;
            }
            update() {
                const fade = this.type === 'snake' ? 0.03 : 0.008;
                this.opacity -= fade;
                if (this.scale < 1) this.scale += 0.2;
            }
            draw(context) {
                if (this.opacity <= 0.01) return;
                context.save();
                context.translate(this.x, this.y);
                context.rotate(this.angle);
                context.globalAlpha = Math.max(0, this.opacity);
                context.scale(this.scale, this.scale);
                context.shadowColor = "rgba(180, 190, 200, 0.6)";
                context.shadowBlur = 8; context.shadowOffsetX = 2; context.shadowOffsetY = 2;
                context.fillStyle = "#Eef2f5";
                animals[this.type].func(context, this.isLeft);
                context.restore();
            }
        }

        // --- 이벤트 핸들러 ---
        function handleStart(e) {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            // 첫 클릭 시 오버레이 숨김
            if (overlay.style.opacity !== '0') {
                overlay.style.opacity = 0;
                setTimeout(() => overlay.style.display = 'none', 500);
            }

            const point = e.touches ? e.touches[0] : e;
            inputX = point.clientX;
            inputY = point.clientY;
            lastStepX = inputX;
            lastStepY = inputY;
            isInteracting = true;
        }

        function handleMove(e) {
            if (!isInteracting && !e.touches) return;
            if(e.cancelable) e.preventDefault();

            const point = e.touches ? e.touches[0] : e;
            inputX = point.clientX;
            inputY = point.clientY;
            isInteracting = true;

            if (lastStepX === 0 && lastStepY === 0) {
                lastStepX = inputX;
                lastStepY = inputY;
                return;
            }

            const dx = inputX - lastStepX;
            const dy = inputY - lastStepY;
            const distance = Math.hypot(dx, dy);
            
            const config = animals[currentAnimal];

            if (distance > config.dist) {
                const angle = Math.atan2(dy, dx);
                footprints.push(new Footprint(inputX, inputY, angle, isLeftFoot, currentAnimal));
                
                // 진짜 사운드 재생
                if (isAudioReady) playRealSnowSound();

                lastStepX = inputX;
                lastStepY = inputY;
                isLeftFoot = !isLeftFoot;
            }
        }

        function handleEnd() {
            if ('ontouchstart' in window) isInteracting = false; 
            lastStepX = 0;
            lastStepY = 0;
        }

        // --- 이벤트 리스너 ---
        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        window.addEventListener('resize', resize);
        
        // --- 애니메이션 루프 ---
        function animate() {
            ctx.drawImage(bgCanvas, 0, 0);

            for (let i = footprints.length - 1; i >= 0; i--) {
                const fp = footprints[i];
                fp.update();
                fp.draw(ctx);
                if (fp.opacity <= 0) footprints.splice(i, 1);
            }

            if (isInteracting) {
                ctx.fillStyle = "rgba(150, 150, 150, 0.5)";
                ctx.beginPath();
                ctx.arc(inputX, inputY, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
